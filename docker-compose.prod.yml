name: internal-developer-portal-prod

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile.prod

x-app-environment: &app-environment
  APP_ENV: production
  AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-86400}
  DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in your production env file}
  CONNECTOR_SECRET_KEY: ${CONNECTOR_SECRET_KEY:?Set CONNECTOR_SECRET_KEY in your production env file}
  CONNECTOR_WORKER_ENABLED: ${CONNECTOR_WORKER_ENABLED:-true}
  CONNECTOR_SCHEDULER_ENABLED: ${CONNECTOR_SCHEDULER_ENABLED:-true}
  CONNECTOR_WORKER_POLL_MS: ${CONNECTOR_WORKER_POLL_MS:-500}
  CONNECTOR_WORKER_HEARTBEAT_INTERVAL_SECONDS: ${CONNECTOR_WORKER_HEARTBEAT_INTERVAL_SECONDS:-15}
  CONNECTOR_WORKER_STALE_AFTER_SECONDS: ${CONNECTOR_WORKER_STALE_AFTER_SECONDS:-45}
  CONNECTOR_HEALTH_RETENTION_DAYS: ${CONNECTOR_HEALTH_RETENTION_DAYS:-30}
  CONNECTOR_RUN_RETENTION_DAYS: ${CONNECTOR_RUN_RETENTION_DAYS:-90}
  AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-365}
  CONNECTOR_RETENTION_CLEANUP_INTERVAL_SECONDS: ${CONNECTOR_RETENTION_CLEANUP_INTERVAL_SECONDS:-3600}
  ROCKET_ADDRESS: 0.0.0.0
  ROCKET_PORT: ${ROCKET_PORT:-8000}

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your production env file}
      POSTGRES_DB: ${POSTGRES_DB:-portal}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal} -d ${POSTGRES_DB:-portal}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    image: internal-developer-portal:prod
    build: *app-build
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment: *app-environment
    command: ["diesel", "migration", "run"]

  app:
    image: internal-developer-portal:prod
    build: *app-build
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment: *app-environment
    ports:
      - "${PORT:-8000}:${ROCKET_PORT:-8000}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${ROCKET_PORT:-8000}/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: internal-developer-portal:prod
    build: *app-build
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment: *app-environment
    command: ["/app/worker"]

  seed-admin:
    image: internal-developer-portal:prod
    build: *app-build
    profiles:
      - seed-admin
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *app-environment
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_ADMIN_ROLES: ${SEED_ADMIN_ROLES:-admin,member}
    command:
      - /bin/sh
      - -c
      - |
        if [ -z "$$SEED_ADMIN_USERNAME" ] || [ -z "$$SEED_ADMIN_PASSWORD" ]; then
          echo "Set SEED_ADMIN_USERNAME and SEED_ADMIN_PASSWORD before running the seed-admin profile." >&2
          exit 1
        fi
        /app/cli users ensure-admin --username "$$SEED_ADMIN_USERNAME" --password "$$SEED_ADMIN_PASSWORD" --roles "$$SEED_ADMIN_ROLES"

volumes:
  postgres-data:
