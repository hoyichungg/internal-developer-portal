name: internal-developer-portal-prod

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile.prod

x-database-environment: &database-environment
  DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in your production env file}

x-runtime-environment: &runtime-environment
  <<: *database-environment
  APP_ENV: production
  AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-86400}
  AUTH_MAX_ACTIVE_SESSIONS_PER_USER: ${AUTH_MAX_ACTIVE_SESSIONS_PER_USER:-20}
  AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
  AUTH_LOGIN_MAX_FAILURES: ${AUTH_LOGIN_MAX_FAILURES:-5}
  AUTH_LOGIN_ACCOUNT_MAX_FAILURES: ${AUTH_LOGIN_ACCOUNT_MAX_FAILURES:-50}
  AUTH_LOGIN_WINDOW_SECONDS: ${AUTH_LOGIN_WINDOW_SECONDS:-900}
  AUTH_LOGIN_LOCKOUT_SECONDS: ${AUTH_LOGIN_LOCKOUT_SECONDS:-900}
  CONNECTOR_SECRET_KEY: ${CONNECTOR_SECRET_KEY:?Set CONNECTOR_SECRET_KEY in your production env file}
  CONNECTOR_WORKER_ENABLED: ${CONNECTOR_WORKER_ENABLED:-true}
  CONNECTOR_SCHEDULER_ENABLED: ${CONNECTOR_SCHEDULER_ENABLED:-true}
  CONNECTOR_WORKER_POLL_MS: ${CONNECTOR_WORKER_POLL_MS:-500}
  CONNECTOR_WORKER_HEARTBEAT_INTERVAL_SECONDS: ${CONNECTOR_WORKER_HEARTBEAT_INTERVAL_SECONDS:-15}
  CONNECTOR_WORKER_STALE_AFTER_SECONDS: ${CONNECTOR_WORKER_STALE_AFTER_SECONDS:-45}
  CONNECTOR_RUN_LEASE_SECONDS: ${CONNECTOR_RUN_LEASE_SECONDS:-60}
  CONNECTOR_RUN_LEASE_RENEW_INTERVAL_SECONDS: ${CONNECTOR_RUN_LEASE_RENEW_INTERVAL_SECONDS:-15}
  CONNECTOR_RUN_MAX_ATTEMPTS: ${CONNECTOR_RUN_MAX_ATTEMPTS:-3}
  CONNECTOR_RUN_RETRY_BASE_SECONDS: ${CONNECTOR_RUN_RETRY_BASE_SECONDS:-5}
  CONNECTOR_RUN_RETRY_MAX_SECONDS: ${CONNECTOR_RUN_RETRY_MAX_SECONDS:-300}
  CONNECTOR_HEALTH_RETENTION_DAYS: ${CONNECTOR_HEALTH_RETENTION_DAYS:-30}
  CONNECTOR_RUN_RETENTION_DAYS: ${CONNECTOR_RUN_RETENTION_DAYS:-90}
  AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-365}
  CONNECTOR_RETENTION_CLEANUP_INTERVAL_SECONDS: ${CONNECTOR_RETENTION_CLEANUP_INTERVAL_SECONDS:-3600}
  ROCKET_ADDRESS: 0.0.0.0
  ROCKET_PORT: ${ROCKET_PORT:-8000}

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your production env file}
      POSTGRES_DB: ${POSTGRES_DB:-portal}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal} -d ${POSTGRES_DB:-portal}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    image: internal-developer-portal:prod
    build: *app-build
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment: *database-environment
    command: ["diesel", "migration", "run"]

  app:
    image: internal-developer-portal:prod
    build: *app-build
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *runtime-environment
      AUTH_PASSWORD_LOGIN_ENABLED: ${AUTH_PASSWORD_LOGIN_ENABLED:-true}
      AUTH_ENTRA_ENABLED: ${AUTH_ENTRA_ENABLED:-false}
      AUTH_ENTRA_TENANT_ID: ${AUTH_ENTRA_TENANT_ID:-}
      AUTH_ENTRA_CLIENT_ID: ${AUTH_ENTRA_CLIENT_ID:-}
      AUTH_ENTRA_CLIENT_SECRET: ${AUTH_ENTRA_CLIENT_SECRET:-}
      AUTH_ENTRA_REDIRECT_URI: ${AUTH_ENTRA_REDIRECT_URI:-}
      AUTH_OIDC_TRANSACTION_KEY: ${AUTH_OIDC_TRANSACTION_KEY:-}
      AUTH_ENTRA_ISSUER: ${AUTH_ENTRA_ISSUER:-}
      AUTH_ENTRA_AUTHORIZATION_URL: ${AUTH_ENTRA_AUTHORIZATION_URL:-}
      AUTH_ENTRA_TOKEN_URL: ${AUTH_ENTRA_TOKEN_URL:-}
      AUTH_ENTRA_JWKS_URL: ${AUTH_ENTRA_JWKS_URL:-}
      AUTH_ENTRA_JIT_PROVISIONING: ${AUTH_ENTRA_JIT_PROVISIONING:-false}
      AUTH_ENTRA_REQUIRED_ROLE: ${AUTH_ENTRA_REQUIRED_ROLE:-}
      AUTH_OIDC_TRANSACTION_TTL_SECONDS: ${AUTH_OIDC_TRANSACTION_TTL_SECONDS:-600}
      AUTH_ENTRA_JWKS_CACHE_SECONDS: ${AUTH_ENTRA_JWKS_CACHE_SECONDS:-300}
      AUTH_ENTRA_CLOCK_SKEW_SECONDS: ${AUTH_ENTRA_CLOCK_SKEW_SECONDS:-120}
      # Rocket's normal request log includes callback query parameters.
      ROCKET_LOG_LEVEL: critical
    ports:
      - "127.0.0.1:${PORT:-8000}:${ROCKET_PORT:-8000}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${ROCKET_PORT:-8000}/readyz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: internal-developer-portal:prod
    build: *app-build
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment: *runtime-environment
    command: ["/app/worker"]
    healthcheck:
      test: ["CMD-SHELL", "grep -qx worker /proc/1/comm"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  seed-admin:
    image: internal-developer-portal:prod
    build: *app-build
    profiles:
      - seed-admin
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *database-environment
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_ADMIN_ROLES: ${SEED_ADMIN_ROLES:-admin,member}
    command:
      - /bin/sh
      - -c
      - |
        if [ -z "$$SEED_ADMIN_USERNAME" ] || [ -z "$$SEED_ADMIN_PASSWORD" ]; then
          echo "Set SEED_ADMIN_USERNAME and SEED_ADMIN_PASSWORD before running the seed-admin profile." >&2
          exit 1
        fi
        /app/cli users ensure-admin --username "$$SEED_ADMIN_USERNAME" --password "$$SEED_ADMIN_PASSWORD" --roles "$$SEED_ADMIN_ROLES"

volumes:
  postgres-data:
