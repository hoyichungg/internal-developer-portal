name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      AUTH_TOKEN_TTL_SECONDS: 86400
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/app_db
      CONNECTOR_SECRET_KEY: ci-connector-secret-key
      CONNECTOR_WORKER_ENABLED: true
      CONNECTOR_SCHEDULER_ENABLED: true
      CONNECTOR_WORKER_POLL_MS: 250
      ROCKET_ADDRESS: 127.0.0.1
      ROCKET_PORT: 8000
      ROCKET_DATABASES: '{postgres={url="postgres://postgres:postgres@localhost:5432/app_db"}}'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install 1.81.0 --profile minimal --component clippy,rustfmt
          rustup default 1.81.0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend build

      - name: Check formatting
        run: cargo fmt --check

      - name: Check build
        run: cargo check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build runtime binaries
        run: cargo build --bin server --bin worker

      - name: Install Diesel CLI
        run: cargo install diesel_cli --version 2.1.1 --locked --no-default-features --features postgres

      - name: Run migrations
        run: diesel migration run

      - name: Start server
        run: |
          ./target/debug/server > server.log 2>&1 &
          echo $! > server.pid
          for i in {1..120}; do
            if ! kill -0 "$(cat server.pid)" 2>/dev/null; then
              cat server.log
              exit 1
            fi
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat server.log
          exit 1

      - name: Start connector worker
        run: |
          ./target/debug/worker > worker.log 2>&1 &
          echo $! > worker.pid
          sleep 2
          if ! kill -0 "$(cat worker.pid)" 2>/dev/null; then
            cat worker.log
            exit 1
          fi

      - name: Run tests
        run: |
          if ! cargo test; then
            cat server.log
            cat worker.log
            exit 1
          fi
