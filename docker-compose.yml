name: internal-developer-portal

services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app_db
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7

  migrate:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres/app_db
      - SEED_ADMIN_USERNAME=admin
      - SEED_ADMIN_PASSWORD=admin123
      - SEED_ADMIN_ROLES=admin,member
    command: ["sh", "-c", "diesel migration run && cargo run --bin cli -- users ensure-admin"]
    volumes:
      - ./:/app/
      - app-target:/app/target

  app:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - APP_ENV=development
      - AUTH_TOKEN_TTL_SECONDS=86400
      - DATABASE_URL=postgres://postgres:postgres@postgres/app_db
      - CONNECTOR_SECRET_KEY=dev-connector-secret-key
      - CONNECTOR_HEALTH_RETENTION_DAYS=30
      - CONNECTOR_RUN_RETENTION_DAYS=90
      - AUDIT_LOG_RETENTION_DAYS=365
      - CONNECTOR_WORKER_STALE_AFTER_SECONDS=45
      - CONNECTOR_RETENTION_CLEANUP_INTERVAL_SECONDS=3600
      - CARGO_TARGET_DIR=/app/target/app
      - ROCKET_ADDRESS=0.0.0.0
      - ROCKET_PORT=8000
      - ROCKET_DATABASES={postgres={url="postgres://postgres:postgres@postgres/app_db"}}
    ports:
      - 8000:8000
    volumes:
      - ./:/app/
      - app-target:/app/target

  worker:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@postgres/app_db
      - CONNECTOR_SECRET_KEY=dev-connector-secret-key
      - CARGO_TARGET_DIR=/app/target/worker
      - CONNECTOR_WORKER_ENABLED=true
      - CONNECTOR_SCHEDULER_ENABLED=true
      - CONNECTOR_WORKER_POLL_MS=500
      - CONNECTOR_WORKER_HEARTBEAT_INTERVAL_SECONDS=15
      - CONNECTOR_WORKER_STALE_AFTER_SECONDS=45
      - CONNECTOR_HEALTH_RETENTION_DAYS=30
      - CONNECTOR_RUN_RETENTION_DAYS=90
      - AUDIT_LOG_RETENTION_DAYS=365
      - CONNECTOR_RETENTION_CLEANUP_INTERVAL_SECONDS=3600
    command: ["sh", "-c", "cargo watch --why -x 'run --bin worker'"]
    volumes:
      - ./:/app/
      - app-target:/app/target

volumes:
  app-target:
  postgres-data:
