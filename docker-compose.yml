name: internal-developer-portal

services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app_db
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres/app_db
      - SEED_ADMIN_USERNAME=admin
      - SEED_ADMIN_PASSWORD=admin123
      - SEED_ADMIN_ROLES=admin,member
    command: ["sh", "-c", "diesel migration run && cargo run --bin cli -- users ensure-admin && cargo run --bin cli -- demo seed"]
    volumes:
      - app-target:/app/target

  app:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - APP_ENV=development
      - AUTH_TOKEN_TTL_SECONDS=${AUTH_TOKEN_TTL_SECONDS:-86400}
      - AUTH_MAX_ACTIVE_SESSIONS_PER_USER=${AUTH_MAX_ACTIVE_SESSIONS_PER_USER:-20}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - AUTH_LOGIN_MAX_FAILURES=${AUTH_LOGIN_MAX_FAILURES:-5}
      - AUTH_LOGIN_ACCOUNT_MAX_FAILURES=${AUTH_LOGIN_ACCOUNT_MAX_FAILURES:-50}
      - AUTH_LOGIN_WINDOW_SECONDS=${AUTH_LOGIN_WINDOW_SECONDS:-900}
      - AUTH_LOGIN_LOCKOUT_SECONDS=${AUTH_LOGIN_LOCKOUT_SECONDS:-900}
      - AUTH_PASSWORD_LOGIN_ENABLED=${AUTH_PASSWORD_LOGIN_ENABLED:-true}
      - AUTH_ENTRA_ENABLED=${AUTH_ENTRA_ENABLED:-false}
      - AUTH_ENTRA_TENANT_ID=${AUTH_ENTRA_TENANT_ID:-}
      - AUTH_ENTRA_CLIENT_ID=${AUTH_ENTRA_CLIENT_ID:-}
      - AUTH_ENTRA_CLIENT_SECRET=${AUTH_ENTRA_CLIENT_SECRET:-}
      - AUTH_ENTRA_REDIRECT_URI=${AUTH_ENTRA_REDIRECT_URI:-}
      - AUTH_OIDC_TRANSACTION_KEY=${AUTH_OIDC_TRANSACTION_KEY:-}
      - AUTH_ENTRA_ISSUER=${AUTH_ENTRA_ISSUER:-}
      - AUTH_ENTRA_AUTHORIZATION_URL=${AUTH_ENTRA_AUTHORIZATION_URL:-}
      - AUTH_ENTRA_TOKEN_URL=${AUTH_ENTRA_TOKEN_URL:-}
      - AUTH_ENTRA_JWKS_URL=${AUTH_ENTRA_JWKS_URL:-}
      - AUTH_ENTRA_JIT_PROVISIONING=${AUTH_ENTRA_JIT_PROVISIONING:-false}
      - AUTH_ENTRA_REQUIRED_ROLE=${AUTH_ENTRA_REQUIRED_ROLE:-}
      - AUTH_OIDC_TRANSACTION_TTL_SECONDS=${AUTH_OIDC_TRANSACTION_TTL_SECONDS:-600}
      - AUTH_ENTRA_JWKS_CACHE_SECONDS=${AUTH_ENTRA_JWKS_CACHE_SECONDS:-300}
      - AUTH_ENTRA_CLOCK_SKEW_SECONDS=${AUTH_ENTRA_CLOCK_SKEW_SECONDS:-120}
      - DATABASE_URL=postgres://postgres:postgres@postgres/app_db
      - CONNECTOR_SECRET_KEY=dev-connector-secret-key
      - CONNECTOR_HEALTH_RETENTION_DAYS=30
      - CONNECTOR_RUN_RETENTION_DAYS=90
      - AUDIT_LOG_RETENTION_DAYS=365
      - CONNECTOR_WORKER_STALE_AFTER_SECONDS=45
      - CONNECTOR_RUN_MAX_ATTEMPTS=3
      - CONNECTOR_RETENTION_CLEANUP_INTERVAL_SECONDS=3600
      - CARGO_TARGET_DIR=/app/target/app
      - ROCKET_ADDRESS=0.0.0.0
      - ROCKET_PORT=8000
      - ROCKET_DATABASES={postgres={url="postgres://postgres:postgres@postgres/app_db"}}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./src:/app/src:ro
      - app-target:/app/target

  worker:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@postgres/app_db
      - CONNECTOR_SECRET_KEY=dev-connector-secret-key
      - CARGO_TARGET_DIR=/app/target/worker
      - CONNECTOR_WORKER_ENABLED=true
      - CONNECTOR_SCHEDULER_ENABLED=true
      - CONNECTOR_WORKER_POLL_MS=500
      - CONNECTOR_WORKER_HEARTBEAT_INTERVAL_SECONDS=15
      - CONNECTOR_WORKER_STALE_AFTER_SECONDS=45
      - CONNECTOR_RUN_LEASE_SECONDS=60
      - CONNECTOR_RUN_LEASE_RENEW_INTERVAL_SECONDS=15
      - CONNECTOR_RUN_MAX_ATTEMPTS=3
      - CONNECTOR_RUN_RETRY_BASE_SECONDS=5
      - CONNECTOR_RUN_RETRY_MAX_SECONDS=300
      - CONNECTOR_HEALTH_RETENTION_DAYS=30
      - CONNECTOR_RUN_RETENTION_DAYS=90
      - AUDIT_LOG_RETENTION_DAYS=365
      - CONNECTOR_RETENTION_CLEANUP_INTERVAL_SECONDS=3600
    command: ["sh", "-c", "cargo watch --why -x 'run --bin worker'"]
    volumes:
      - ./src:/app/src:ro
      - app-target:/app/target

volumes:
  app-target:
  postgres-data:
